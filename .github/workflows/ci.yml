name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.25.5"
  TASK_VERSION: "v3.45.5"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go install github.com/go-task/task/v3/cmd/task@${{ env.TASK_VERSION }}
      - run: task lint

  unit:
    name: Unit & Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go install github.com/go-task/task/v3/cmd/task@${{ env.TASK_VERSION }}
      - run: task test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go install github.com/go-task/task/v3/cmd/task@${{ env.TASK_VERSION }}
      # ubuntu-latest runners ship a running Docker daemon, so testcontainers-go
      # (Postgres, Valkey, Keycloak) works with no services: block or dind setup.
      - run: task test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go install github.com/go-task/task/v3/cmd/task@${{ env.TASK_VERSION }}
      - run: task build
      - name: Build Docker image
        run: docker build --target builder -t evently-api:ci .
