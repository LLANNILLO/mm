version: "2"
overrides:
  go:
    overrides:
      - db_type: "uuid"
        nullable: false
        engine: "postgresql"
        go_type:
          import: github.com/google/uuid
          type: "UUID"

      - db_type: "uuid"
        nullable: true
        engine: "postgresql"
        go_type:
          import: "github.com/google/uuid"
          type: "UUID"
          pointer: true

      - db_type: "text"
        nullable: false
        go_type:
          type: "string"

      - db_type: "text"
        nullable: true
        go_type:
          type: "string"
          pointer: true

sql:
  - schema: "./migrations"
    queries: "./query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "store"
        out: "./generated"
        sql_package: "pgx/v5"
        emit_interface: false
        emit_json_tags: true
