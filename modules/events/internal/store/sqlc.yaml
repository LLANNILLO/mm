version: "2"
overrides:
  go:
    overrides:
      - db_type: "uuid"
        nullable: false
        engine: "postgresql"
        go_type:
          import: github.com/google/uuid
          type: "UUID"

      - db_type: "uuid"
        engine: "postgresql"
        nullable: true
        go_type:
          import: "github.com/google/uuid"
          type: "UUID"

      - db_type: "timestamptz"
        nullable: false
        engine: "postgresql"
        go_type:
          type: "time.Time"

      - db_type: "timestamptz"
        nullable: true
        engine: "postgresql"
        go_type:
          type: "time.Time"

      - db_type: "text"
        nullable: false
        go_type:
          type: "string"

      - db_type: "text"
        nullable: true
        go_type:
          type: "string"
          pointer: true
sql:
  - schema: "./migrations"
    queries: "./query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "store"
        out: "."
        sql_package: "pgx/v5"
        emit_interface: false
        emit_json_tags: true
        overrides:
          - column: "events.events.status"
            go_type:
              import: "github.com/llannillo/mm/modules/events/internal/domain"
              type: "EventStatus"
            nullable: false
