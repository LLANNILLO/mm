---
services:
  evently.api:
    build: .
    container_name: Evently.Api
    ports:
      - "5000:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@evently.database:5432/evently?sslmode=disable
      SEQ_ENDPOINT: http://evently.seq
      VALKEY_URL: evently.valkey:6379
    depends_on:
      evently.database:
        condition: service_healthy
      evently.valkey:
        condition: service_healthy

  evently.database:
    image: postgres:18-alpine
    container_name: Evently.Database
    environment:
      POSTGRES_DB: evently
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # PGDATA fuerza la ruta de datos dentro del contenedor.
      # Por defecto var/lib/postgresql/18/docker
      PGDATA: /var/lib/postgresql/data
    restart: unless-stopped
    volumes:
      - evently_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evently"]
      interval: 5s
      timeout: 5s
      retries: 5

  evently.identity:
    image: quay.io/keycloak/keycloak:latest
    container_name: Evently.Identity
    command: start-dev --import-realm
    environment:
      - KC_HEALTH_ENABLED=true
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./.containers/identity:/opt/keycloak/data
      - ./.files:/opt/keycloak/data/import
    ports:
      - 18080:8080
      - 9000:9000

  evently.seq:
    image: datalust/seq:latest
    container_name: Evently.Seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
      - "8081:5341"
    volumes:
      - evently_seq_data:/data

  evently.valkey:
    image: valkey/valkey:9-alpine
    container_name: Evently.Valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - evently_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  evently_data:
  evently_seq_data:
  evently_valkey_data:
