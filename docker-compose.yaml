---
services:
  evently.api:
    build: .
    container_name: Evently.Api
    ports:
      - "5000:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@evently.database:5432/evently?sslmode=disable
      SEQ_ENDPOINT: http://evently.seq
    depends_on:
      evently.database:
        condition: service_healthy

  evently.database:
    image: postgres:18-alpine
    container_name: Evently.Database
    environment:
      POSTGRES_DB: evently
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # PGDATA fuerza la ruta de datos dentro del contenedor.
      # Por defecto var/lib/postgresql/18/docker
      PGDATA: /var/lib/postgresql/data
    restart: unless-stopped
    volumes:
      - evently_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evently"]
      interval: 5s
      timeout: 5s
      retries: 5

  evently.seq:
    image: datalust/seq:latest
    container_name: Evently.Seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
      - "8081:5341"
    volumes:
      - evently_seq_data:/data

volumes:
  evently_data:
  evently_seq_data:
